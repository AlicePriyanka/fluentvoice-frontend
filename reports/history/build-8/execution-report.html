
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Appium Execution Report</title>
  <style>
    body { font-family: sans-serif; background: #0B0F19; color: #F3F4F6; padding: 20px; }
    h1 { color: #818CF8; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #2D3748; padding: 8px; text-align: left; }
    th { background: #151B26; }
    tr:nth-child(even) { background: #1E2633; }
  </style>
</head>
<body>
  <h1>Appium Mobile Test Run Report</h1>
  <div>
    <p>Total Tests: 1</p>
    <p>Passed: 0</p>
    <p>Failed: 1</p>
    <p>Pass Rate: 0.00%</p>
  </div>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Category</th>
        <th>Name</th>
        <th>Duration</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      
    <tr>
      <td>TC_ERR</td>
      <td>Appium Error</td>
      <td>Fatal Error - Setup failed or timeout starting emulator</td>
      <td>120ms</td>
      <td><span style="color: #EF4444">FAIL</span></td>
    </tr>
  
    </tbody>
  </table>
</body>
</html>
