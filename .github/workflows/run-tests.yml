name: E2E Test Suite

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  python-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Fluentvoice frontend"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install selenium openpyxl webdriver-manager

      - name: Run Python E2E Test Suite
        env:
          BASE_URL: https://alicepriyanka.github.io/fluentvoice
          DISPLAY: ":99"
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          python tests/e2e_fluentvoice_tests.py

      - name: Upload Python Test Report Excel
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Python-E2E-Test-Report
          path: "Fluentvoice frontend/E2E_Test_Report_FluentVoice_*.xlsx"

  run-e2e-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Fluentvoice frontend"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Chrome
        run: |
          sudo apt-get update -y
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node.js dependencies (app)
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Install Node.js dependencies (tests)
        run: |
          cd selenium-tests
          npm ci

      - name: Start preview server
        run: |
          node selenium-tests/scripts/serve.js &
          sleep 4
          curl -s http://127.0.0.1:5173/fluentvoice/ || echo "Waiting..."

      - name: Run Node.js Selenium Test Suite
        continue-on-error: true
        env:
          BASE_URL: http://127.0.0.1:5173/fluentvoice
          HEADLESS: "true"
          PATIENT_EMAIL: testpatient@fluentvoice.io
          PATIENT_PASSWORD: TestPass123
          THERAPIST_EMAIL: testtherapist@fluentvoice.io
          THERAPIST_PASSWORD: TestPass123
          DEFAULT_TIMEOUT_MS: "20000"
          PAGE_LOAD_THRESHOLD_MS: "8000"
          ALLOW_DATA_MUTATION: "false"
          FAIL_ON_SERIOUS_A11Y: "false"
          SECURITY_HEADERS_STRICT: "false"
        run: |
          cd selenium-tests
          npm test || true

      - name: Inject E2E reports to Next.js build
        if: always()
        run: |
          mkdir -p out/reports/latest
          mkdir -p out/reports/history/build-${{ github.run_number }}
          cp selenium-tests/artifacts/reports/execution-report.html out/reports/latest/execution-report.html || true
          cp selenium-tests/artifacts/reports/execution-report.html out/reports/history/build-${{ github.run_number }}/execution-report.html || true
          cp selenium-tests/artifacts/reports/selenium-report.xlsx out/reports/latest/selenium-report.xlsx || true
          cp selenium-tests/artifacts/reports/selenium-report.xlsx out/reports/history/build-${{ github.run_number }}/selenium-report.xlsx || true

      - name: Upload Node.js Test Report Excel
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Nodejs-Selenium-Test-Report
          path: "Fluentvoice frontend/selenium-tests/artifacts/reports/FluentVoice_Selenium_Report_*.xlsx"

      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: "Fluentvoice frontend/out"

      - name: Deploy to GitHub Pages
        if: always()
        uses: actions/deploy-pages@v4

  security-review:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Fluentvoice frontend"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node.js dependencies
        run: |
          cd selenium-tests
          npm ci

      - name: Run Security Review
        run: |
          cd selenium-tests
          node scripts/generateWebSecuritySuite.js >> $GITHUB_STEP_SUMMARY
          # Enforce Zero-Critical Policy
          if grep -q "| \*\*Critical Vulnerabilities\*\* | [1-9]" $GITHUB_STEP_SUMMARY; then
            echo "Security Policy Gate Failed: Critical vulnerabilities found!"
            exit 1
          fi

      - name: Upload Security Report Excel
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Web-Security-Findings-Report
          path: "Fluentvoice frontend/selenium-tests/artifacts/web-security-findings.xlsx"
